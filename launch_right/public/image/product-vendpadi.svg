<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#065F46"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- WhatsApp chat UI mockup -->
  <rect x="80" y="30" width="240" height="190" rx="16" fill="#075E54"/>
  <rect x="90" y="70" width="220" height="140" rx="4" fill="#ECE5DD"/>
  <!-- Chat header -->
  <rect x="80" y="30" width="240" height="50" rx="16" fill="#075E54"/>
  <rect x="80" y="55" width="240" height="25" fill="#075E54"/>
  <circle cx="110" cy="55" r="14" fill="#128C7E"/>
  <rect x="135" y="45" width="100" height="10" rx="5" fill="#FFFFFF" opacity="0.9"/>
  <rect x="135" y="58" width="60" height="6" rx="3" fill="#FFFFFF" opacity="0.5"/>
  <!-- Chat bubbles -->
  <rect x="180" y="85" width="120" height="30" rx="8" fill="#DCF8C6"/>
  <rect x="190" y="92" width="80" height="6" rx="3" fill="#075E54" opacity="0.6"/>
  <rect x="190" y="102" width="50" height="6" rx="3" fill="#075E54" opacity="0.4"/>
  <!-- Product items in chat -->
  <rect x="100" y="130" width="130" height="60" rx="8" fill="#FFFFFF"/>
  <rect x="105" y="135" width="50" height="40" rx="4" fill="#E5E7EB"/>
  <circle cx="130" cy="155" r="10" fill="#10B981" opacity="0.3"/>
  <rect x="165" y="140" width="55" height="6" rx="3" fill="#1F2937"/>
  <rect x="165" y="150" width="40" height="5" rx="2" fill="#059669"/>
  <rect x="165" y="160" width="50" height="12" rx="6" fill="#059669"/>
  <rect x="170" y="164" width="40" height="4" rx="2" fill="#FFFFFF"/>
  <!-- Second product -->
  <rect x="100" y="195" width="130" height="10" rx="4" fill="#FFFFFF" opacity="0.3"/>
</svg>
