<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- CAC Certificate mockup -->
  <rect x="100" y="30" width="200" height="190" rx="8" fill="#FAFAF9" stroke="#C9972B" stroke-width="2"/>
  <rect x="110" y="40" width="180" height="170" fill="#FAFAF9"/>
  <!-- Certificate border decoration -->
  <rect x="115" y="45" width="170" height="160" rx="4" fill="none" stroke="#C9972B" stroke-width="0.5" opacity="0.3"/>
  <!-- Certificate content -->
  <rect x="150" y="60" width="100" height="8" rx="4" fill="#C9972B"/>
  <rect x="140" y="80" width="120" height="6" rx="3" fill="#1A1A2E"/>
  <rect x="140" y="95" width="120" height="4" rx="2" fill="#6B7280"/>
  <rect x="140" y="105" width="100" height="4" rx="2" fill="#6B7280"/>
  <rect x="140" y="115" width="80" height="4" rx="2" fill="#6B7280"/>
  <!-- Seal -->
  <circle cx="200" cy="160" r="25" fill="none" stroke="#C9972B" stroke-width="1.5"/>
  <circle cx="200" cy="160" r="18" fill="none" stroke="#C9972B" stroke-width="0.5"/>
  <text x="185" y="164" font-family="sans-serif" font-size="10" fill="#C9972B" font-weight="bold">CAC</text>
  <!-- Decorative -->
  <circle cx="50" cy="200" r="40" fill="#C9972B" opacity="0.08"/>
  <circle cx="350" cy="50" r="30" fill="#C9972B" opacity="0.06"/>
</svg>
