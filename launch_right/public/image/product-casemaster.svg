  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Dashboard mockup -->
  <rect x="40" y="30" width="320" height="190" rx="12" fill="#1E3448" stroke="#2A4A6B" stroke-width="1"/>
