  <text x="125" y="100" font-family="sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">156</text>
  <text x="125" y="118" font-family="sans-serif" font-size="8" fill="#6B7280">Active Cases</text>
  <rect x="200" y="80" width="75" height="55" rx="6" fill="#152238" stroke="#2A4A6B" stroke-width="0.5"/>
  <text x="210" y="100" font-family="sans-serif" font-size="16" fill="#C9972B" font-weight="bold">23</text>
  <text x="210" y="118" font-family="sans-serif" font-size="8" fill="#6B7280">New Clients</text>
  <rect x="285" y="80" width="75" height="55" rx="6" fill="#152238" stroke="#2A4A6B" stroke-width="0.5"/>
  <text x="295" y="100" font-family="sans-serif" font-size="16" fill="#10B981" font-weight="bold">98%</text>
  <text x="295" y="118" font-family="sans-serif" font-size="8" fill="#6B7280">Compliance</text>
  <!-- Table rows -->
  <rect x="115" y="145" width="240" height="20" rx="4" fill="#152238"/>
  <rect x="125" y="152" width="80" height="6" rx="3" fill="#2A4A6B"/>
  <rect x="220" y="152" width="50" height="6" rx="3" fill="#10B981" opacity="0.3"/>
  <rect x="290" y="152" width="50" height="6" rx="3" fill="#C9972B" opacity="0.3"/>
  <rect x="115" y="170" width="240" height="20" rx="4" fill="#0A1628"/>
  <rect x="125" y="177" width="60" height="6" rx="3" fill="#2A4A6B"/>
  <rect x="220" y="177" width="60" height="6" rx="3" fill="#10B981" opacity="0.3"/>
  <rect x="290" y="177" width="40" height="6" rx="3" fill="#C9972B" opacity="0.3"/>
  <rect x="115" y="195" width="240" height="20" rx="4" fill="#152238"/>
