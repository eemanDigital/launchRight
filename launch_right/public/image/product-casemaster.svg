<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="blueBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="280" rx="16" fill="url(#blueBg)"/>

  <!-- Dashboard mockup -->
  <g filter="url(#softShadow)">
    <rect x="40" y="30" width="320" height="220" rx="12" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1"/>
    <!-- Top bar -->
    <rect x="40" y="30" width="320" height="35" rx="12" fill="#F8FAFC"/>
    <rect x="40" y="50" width="320" height="15" fill="#F8FAFC"/>
    <circle cx="60" cy="47" r="5" fill="#EF4444" opacity="0.6"/>
    <circle cx="75" cy="47" r="5" fill="#F59E0B" opacity="0.6"/>
    <circle cx="90" cy="47" r="5" fill="#10B981" opacity="0.6"/>
    <rect x="110" y="43" width="80" height="8" rx="4" fill="#E2E8F0"/>
    <!-- Sidebar -->
    <rect x="40" y="65" width="55" height="185" fill="#F8FAFC"/>
    <rect x="48" y="75" width="39" height="20" rx="4" fill="#DBEAFE"/>
    <rect x="52" y="82" width="15" height="5" rx="2" fill="#3B82F6"/>
    <rect x="48" y="100" width="39" height="8" rx="4" fill="#F1F5F9"/>
    <rect x="48" y="112" width="39" height="8" rx="4" fill="#F1F5F9"/>
    <rect x="48" y="124" width="39" height="8" rx="4" fill="#F1F5F9"/>
    <rect x="48" y="136" width="39" height="8" rx="4" fill="#F1F5F9"/>
    <!-- Main content -->
    <!-- Stats cards -->
    <rect x="105" y="75" width="75" height="50" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="115" y="98" font-family="system-ui, sans-serif" font-size="18" fill="#1E40AF" font-weight="700">156</text>
    <text x="115" y="112" font-family="system-ui, sans-serif" font-size="7" fill="#64748B">Active Cases</text>
    <rect x="190" y="75" width="75" height="50" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="200" y="98" font-family="system-ui, sans-serif" font-size="18" fill="#C9972B" font-weight="700">23</text>
    <text x="200" y="112" font-family="system-ui, sans-serif" font-size="7" fill="#64748B">New Clients</text>
    <rect x="275" y="75" width="75" height="50" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="285" y="98" font-family="system-ui, sans-serif" font-size="18" fill="#059669" font-weight="700">98%</text>
    <text x="285" y="112" font-family="system-ui, sans-serif" font-size="7" fill="#64748B">Compliance</text>
    <!-- Chart area -->
    <rect x="105" y="135" width="245" height="100" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <!-- Chart bars -->
    <rect x="120" y="195" width="15" height="30" rx="3" fill="#3B82F6" opacity="0.3"/>
    <rect x="145" y="180" width="15" height="45" rx="3" fill="#3B82F6" opacity="0.4"/>
    <rect x="170" y="165" width="15" height="60" rx="3" fill="#3B82F6" opacity="0.5"/>
    <rect x="195" y="155" width="15" height="70" rx="3" fill="#3B82F6" opacity="0.6"/>
    <rect x="220" y="170" width="15" height="55" rx="3" fill="#3B82F6" opacity="0.5"/>
    <rect x="245" y="160" width="15" height="65" rx="3" fill="#3B82F6" opacity="0.6"/>
    <rect x="270" y="150" width="15" height="75" rx="3" fill="url(#blueGrad)" opacity="0.8"/>
    <rect x="295" y="145" width="15" height="80" rx="3" fill="url(#blueGrad)"/>
    <rect x="320" y="140" width="15" height="85" rx="3" fill="url(#blueGrad)"/>
  </g>

  <!-- Floating badge -->
  <g filter="url(#softShadow)">
    <rect x="300" y="20" width="80" height="22" rx="11" fill="#1E40AF"/>
    <text x="340" y="34" font-family="system-ui, sans-serif" font-size="8" fill="#FFFFFF" font-weight="600" text-anchor="middle">IN DEV</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="20" cy="30" r="2" fill="#3B82F6" opacity="0.3"/>
  <circle cx="380" cy="260" r="2" fill="#2563EB" opacity="0.3"/>
</svg>
