  <rect x="40" y="30" width="60" height="190" rx="12" fill="#152238"/>
  <rect x="40" y="100" width="60" height="120" fill="#152238"/>
  <rect x="50" y="45" width="40" height="25" rx="6" fill="#C9972B" opacity="0.3"/>
