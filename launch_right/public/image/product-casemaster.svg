  <rect x="48" y="80" width="44" height="8" rx="4" fill="#2A4A6B"/>
  <rect x="48" y="95" width="44" height="8" rx="4" fill="#C9972B" opacity="0.4"/>
  <rect x="48" y="110" width="44" height="8" rx="4" fill="#2A4A6B"/>
