<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9972B"/>
      <stop offset="100%" stop-color="#E8B84B"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- Decorative -->
  <circle cx="500" cy="100" r="100" fill="#C9972B" opacity="0.08"/>
  <circle cx="150" cy="250" r="70" fill="#10B981" opacity="0.06"/>
  <!-- Scales of Justice -->
  <g transform="translate(300, 120)">
    <!-- Base -->
    <rect x="-8" y="60" width="16" height="20" rx="2" fill="#2A4A6B"/>
    <rect x="-20" y="75" width="40" height="6" rx="3" fill="#2A4A6B"/>
    <!-- Pillar -->
    <rect x="-3" y="-40" width="6" height="100" fill="#C9972B" opacity="0.6"/>
    <!-- Beam -->
    <rect x="-50" y="-42" width="100" height="4" rx="2" fill="#C9972B" opacity="0.6"/>
    <!-- Left pan -->
    <line x1="-45" y1="-38" x2="-55" y2="-15" stroke="#C9972B" opacity="0.4" stroke-width="1"/>
    <line x1="-45" y1="-38" x2="-35" y2="-15" stroke="#C9972B" opacity="0.4" stroke-width="1"/>
    <ellipse cx="-45" cy="-15" rx="18" ry="6" fill="none" stroke="#C9972B" opacity="0.5" stroke-width="1"/>
    <!-- Right pan -->
    <line x1="45" y1="-38" x2="55" y2="-15" stroke="#C9972B" opacity="0.4" stroke-width="1"/>
    <line x1="45" y1="-38" x2="35" y2="-15" stroke="#C9972B" opacity="0.4" stroke-width="1"/>
    <ellipse cx="45" cy="-15" rx="18" ry="6" fill="none" stroke="#C9972B" opacity="0.5" stroke-width="1"/>
    <!-- Crown -->
    <circle cx="0" cy="-45" r="6" fill="url(#gold)"/>
  </g>
  <!-- Text elements -->
  <rect x="180" y="200" width="240" height="8" rx="4" fill="#2A4A6B" opacity="0.5"/>
  <rect x="220" y="215" width="160" height="6" rx="3" fill="#2A4A6B" opacity="0.3"/>
  <!-- Floating legal elements -->
  <rect x="80" y="80" width="60" height="40" rx="6" fill="#1E3448" stroke="#2A4A6B" stroke-width="0.5"/>
  <text x="88" y="105" font-family="sans-serif" font-size="10" fill="#10B981">§ 12.3</text>
  <rect x="450" y="180" width="70" height="45" rx="6" fill="#1E3448" stroke="#2A4A6B" stroke-width="0.5"/>
  <text x="458" y="208" font-family="sans-serif" font-size="10" fill="#C9972B">⚖ Legal</text>
</svg>
