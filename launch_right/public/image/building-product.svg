<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="purpleSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background subtle shape -->
  <rect x="20" y="20" width="280" height="200" rx="16" fill="url(#purpleSoft)"/>

  <!-- Central product/building concept -->
  <g>
    <!-- Left pillar: Legal infrastructure -->
    <rect x="60" y="50" width="60" height="100" rx="8" fill="#8B5CF6" opacity="0.1" stroke="#8B5CF6" stroke-width="1"/>
    <path d="M75 80 L90 70 L105 80 L105 120 L75 120 Z" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <path d="M82 95 L88 101 L98 89" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90" y="140" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">LEGAL</text>

    <!-- Center: Product core -->
    <circle cx="160" cy="100" r="40" fill="#8B5CF6" opacity="0.1" stroke="#8B5CF6" stroke-width="1.5"/>
    <circle cx="160" cy="100" r="25" fill="#8B5CF6" opacity="0.15"/>
    <!-- Code brackets -->
    <path d="M150 95 L145 100 L150 105" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M170 95 L175 100 L170 105" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="157" y1="105" x2="163" y2="95" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round"/>
    <text x="160" y="155" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">PRODUCT</text>

    <!-- Right pillar: Tech execution -->
    <rect x="200" y="50" width="60" height="100" rx="8" fill="#8B5CF6" opacity="0.1" stroke="#8B5CF6" stroke-width="1"/>
    <!-- Monitor shape -->
    <rect x="212" y="62" width="36" height="24" rx="3" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <rect x="218" y="68" width="24" height="12" fill="#8B5CF6" opacity="0.15"/>
    <line x1="227" y1="86" x2="233" y2="86" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="230" y1="86" x2="230" y2="90" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="230" y="140" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">TECH</text>

    <!-- Connection lines -->
    <line x1="120" y1="100" x2="120" y2="100" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <path d="M120 100 C130 100, 130 100, 140 100" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <path d="M180 100 C190 100, 190 100, 200 100" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  </g>

  <!-- Decorative elements -->
  <circle cx="50" cy="40" r="2" fill="#8B5CF6" opacity="0.3"/>
  <circle cx="270" cy="45" r="1.5" fill="#8B5CF6" opacity="0.3"/>
  <circle cx="260" cy="180" r="2" fill="#8B5CF6" opacity="0.2"/>
</svg>
