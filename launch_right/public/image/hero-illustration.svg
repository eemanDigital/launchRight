  <!-- METRIC BADGES (floating)                     -->
  <!-- ============================================ -->
  <g filter="url(#glow)">
    <rect x="50" y="40" width="110" height="48" rx="8" fill="#0A1628" stroke="url(#goldGrad)" stroke-width="1" opacity="0.9"/>
    <text x="105" y="60" font-family="system-ui, sans-serif" font-size="16" fill="#E8B84B" font-weight="700" text-anchor="middle">2,000+</text>
    <text x="105" y="74" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle" letter-spacing="0.5">BUSINESSES LAUNCHED</text>
  </g>

  <g filter="url(#greenGlow)">
    <rect x="740" y="520" width="110" height="48" rx="8" fill="#0A1628" stroke="url(#greenGrad)" stroke-width="1" opacity="0.9"/>
    <text x="795" y="540" font-family="system-ui, sans-serif" font-size="16" fill="#10B981" font-weight="700" text-anchor="middle">4.9 ★</text>
    <text x="795" y="554" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle" letter-spacing="0.5">CLIENT RATING</text>
