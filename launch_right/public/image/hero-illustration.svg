  <g filter="url(#glow)">
    <rect x="720" y="220" width="120" height="48" rx="8" fill="#0A1628" stroke="url(#goldGrad)" stroke-width="1" opacity="0.9"/>
    <text x="780" y="240" font-family="system-ui, sans-serif" font-size="16" fill="#E8B84B" font-weight="700" text-anchor="middle">5+ yrs</text>
    <text x="780" y="254" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle" letter-spacing="0.5">EXPERIENCE</text>
  </g>

  <!-- ============================================ -->
  <!-- DECORATIVE ELEMENTS                          -->
  <!-- ============================================ -->
  
  <!-- Floating dots -->
  <g opacity="0.3">
    <circle cx="320" cy="80" r="3" fill="#C9972B"/>
    <circle cx="580" cy="60" r="2" fill="#10B981"/>
    <circle cx="250" cy="280" r="2.5" fill="#C9972B"/>
    <circle cx="650" cy="280" r="2" fill="#C9972B"/>
    <circle cx="200" cy="450" r="3" fill="#10B981"/>
    <circle cx="700" cy="480" r="2" fill="#E8B84B"/>
    <circle cx="350" cy="560" r="2.5" fill="#C9972B"/>
    <circle cx="580" cy="550" r="2" fill="#10B981"/>
  </g>

  <!-- Hexagonal decorations -->
  <g opacity="0.06" stroke="#C9972B" stroke-width="1" fill="none">
    <polygon points="120,280 135,268 135,248 120,236 105,248 105,268"/>
    <polygon points="800,150 815,138 815,118 800,106 785,118 785,138"/>
    <polygon points="180,600 190,590 190,574 180,564 170,574 170,590"/>
    <polygon points="750,620 765,610 765,590 750,580 735,590 735,610"/>
  </g>

  <!-- Animated-looking pulse rings around center -->
