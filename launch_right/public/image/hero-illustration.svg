    <!-- Top bar of dashboard -->
    <rect x="290" y="155" width="320" height="28" rx="4" fill="#152238"/>
    <circle cx="310" cy="169" r="4" fill="#EF4444" opacity="0.6"/>
    <circle cx="325" cy="169" r="4" fill="#F59E0B" opacity="0.6"/>
    <circle cx="340" cy="169" r="4" fill="#10B981" opacity="0.6"/>
    
    <!-- Dashboard title -->
    <text x="450" y="173" font-family="system-ui, sans-serif" font-size="9" fill="#9CA3AF" text-anchor="middle" font-weight="500">JurisTech Dashboard — Business Registration</text>
    
    <!-- Status indicators row -->
    <g transform="translate(305, 198)">
      <rect width="95" height="50" rx="6" fill="#152238" stroke="#1E3448" stroke-width="0.5"/>
      <text x="10" y="22" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280">Status</text>
      <text x="10" y="38" font-family="system-ui, sans-serif" font-size="11" fill="#10B981" font-weight="600">Approved ✓</text>
    </g>
    
    <g transform="translate(410, 198)">
      <rect width="95" height="50" rx="6" fill="#152238" stroke="#1E3448" stroke-width="0.5"/>
      <text x="10" y="22" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280">Timeline</text>
      <text x="10" y="38" font-family="system-ui, sans-serif" font-size="11" fill="#E8B84B" font-weight="600">24-48 hrs</text>
    </g>
    
    <g transform="translate(515, 198)">
      <rect width="85" height="50" rx="6" fill="#152238" stroke="#1E3448" stroke-width="0.5"/>
      <text x="10" y="22" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280">Type</text>
      <text x="10" y="38" font-family="system-ui, sans-serif" font-size="10" fill="#E8B84B" font-weight="600">Business</text>
