<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9972B"/>
      <stop offset="100%" stop-color="#E8B84B"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9972B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3448"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feFlood flood-color="#C9972B" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Subtle grid background -->
  <g opacity="0.04" stroke="#C9972B" stroke-width="0.5">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="500" x2="900" y2="500"/>
    <line x1="0" y1="600" x2="900" y2="600"/>
    <line x1="100" y1="0" x2="100" y2="700"/>
    <line x1="200" y1="0" x2="200" y2="700"/>
    <line x1="300" y1="0" x2="300" y2="700"/>
    <line x1="400" y1="0" x2="400" y2="700"/>
    <line x1="500" y1="0" x2="500" y2="700"/>
    <line x1="600" y1="0" x2="600" y2="700"/>
    <line x1="700" y1="0" x2="700" y2="700"/>
    <line x1="800" y1="0" x2="800" y2="700"/>
  </g>

  <!-- Central hub - main business building concept -->
  <g filter="url(#softShadow)">
    <!-- Hexagonal center shape -->
    <polygon points="450,280 520,320 520,400 450,440 380,400 380,320" fill="url(#navyGrad)" stroke="url(#goldGrad)" stroke-width="2" opacity="0.95"/>
    
    <!-- Inner content -->
    <text x="450" y="350" font-family="system-ui, sans-serif" font-size="28" fill="#E8B84B" font-weight="700" text-anchor="middle">JT</text>
    <text x="450" y="375" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle" letter-spacing="2">JURISTECH</text>
  </g>

  <!-- Connection lines from center hub -->
  <g stroke="url(#goldSoft)" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.6">
    <!-- To CAC Registration (top) -->
    <line x1="450" y1="280" x2="450" y2="140"/>
    <!-- To Legal (top-right) -->
    <line x1="520" y1="320" x2="680" y2="200"/>
    <!-- To Websites (right) -->
    <line x1="520" y1="360" x2="720" y2="360"/>
    <!-- To Software (bottom-right) -->
    <line x1="520" y1="400" x2="680" y2="500"/>
    <!-- To Compliance (bottom) -->
    <line x1="450" y1="440" x2="450" y2="560"/>
    <!-- To Docs (bottom-left) -->
    <line x1="380" y1="400" x2="220" y2="500"/>
    <!-- To Growth (left) -->
    <line x1="380" y1="360" x2="180" y2="360"/>
    <!-- To Launch (top-left) -->
    <line x1="380" y1="320" x2="220" y2="200"/>
  </g>

  <!-- Satellite node 1: CAC Registration (top) -->
  <g filter="url(#softShadow)">
    <circle cx="450" cy="120" r="45" fill="#152238" stroke="#C9972B" stroke-width="1.5"/>
    <rect x="438" y="100" width="24" height="28" rx="2" fill="none" stroke="#C9972B" stroke-width="1.5"/>
    <path d="M445 108 L455 108 M445 114 L455 114 M445 120 L452 120" stroke="#E8B84B" stroke-width="1.5" stroke-linecap="round"/>
    <text x="450" y="145" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">CAC</text>
  </g>

  <!-- Satellite node 2: Legal (top-right) -->
  <g filter="url(#softShadow)">
    <circle cx="695" cy="185" r="42" fill="#152238" stroke="#C9972B" stroke-width="1.5"/>
    <path d="M688 175 L688 200 L702 200 L702 175 Z" fill="none" stroke="#C9972B" stroke-width="1.5"/>
    <circle cx="695" cy="182" r="4" fill="#E8B84B" opacity="0.6"/>
    <text x="695" y="210" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">LEGAL</text>
  </g>

  <!-- Satellite node 3: Websites (right) -->
  <g filter="url(#softShadow)">
    <circle cx="740" cy="360" r="42" fill="#152238" stroke="#10B981" stroke-width="1.5"/>
    <rect x="728" y="345" width="24" height="18" rx="2" fill="none" stroke="#10B981" stroke-width="1.5"/>
    <line x1="725" y1="363" x2="755" y2="363" stroke="#10B981" stroke-width="1.5"/>
    <line x1="740" y1="363" x2="740" y2="368" stroke="#10B981" stroke-width="1.5"/>
    <text x="740" y="385" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">WEB</text>
  </g>

  <!-- Satellite node 4: Software (bottom-right) -->
  <g filter="url(#softShadow)">
    <circle cx="695" cy="515" r="42" fill="#152238" stroke="#10B981" stroke-width="1.5"/>
    <path d="M685 508 L692 515 L685 522 M705 508 L698 515 L705 522" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="695" y="540" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">SOFTWARE</text>
  </g>

  <!-- Satellite node 5: Compliance (bottom) -->
  <g filter="url(#softShadow)">
    <circle cx="450" cy="580" r="45" fill="#152238" stroke="#C9972B" stroke-width="1.5"/>
    <path d="M440 575 L450 565 L460 575 L460 590 L450 595 L440 590 Z" fill="none" stroke="#C9972B" stroke-width="1.5"/>
    <path d="M446 580 L450 584 L455 577" fill="none" stroke="#E8B84B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="450" y="610" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">COMPLIANCE</text>
  </g>

  <!-- Satellite node 6: Documents (bottom-left) -->
  <g filter="url(#softShadow)">
    <circle cx="205" cy="515" r="42" fill="#152238" stroke="#C9972B" stroke-width="1.5"/>
    <rect x="195" y="500" width="20" height="24" rx="2" fill="none" stroke="#C9972B" stroke-width="1.5"/>
    <line x1="200" y1="508" x2="210" y2="508" stroke="#E8B84B" stroke-width="1"/>
    <line x1="200" y1="514" x2="210" y2="514" stroke="#E8B84B" stroke-width="1"/>
    <line x1="200" y1="520" x2="207" y2="520" stroke="#E8B84B" stroke-width="1"/>
    <text x="205" y="540" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">DOCS</text>
  </g>

  <!-- Satellite node 7: Growth (left) -->
  <g filter="url(#softShadow)">
    <circle cx="160" cy="360" r="42" fill="#152238" stroke="#10B981" stroke-width="1.5"/>
    <path d="M150 370 L158 358 L166 365 L172 355" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M168 355 L172 355 L172 359" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="160" y="385" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">GROWTH</text>
  </g>

  <!-- Satellite node 8: Launch (top-left) -->
  <g filter="url(#softShadow)">
    <circle cx="205" cy="185" r="42" fill="#152238" stroke="#C9972B" stroke-width="1.5"/>
    <path d="M195 195 L205 175 L215 195 Z" fill="none" stroke="#E8B84B" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="205" cy="190" r="2" fill="#E8B84B"/>
    <text x="205" y="210" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">LAUNCH</text>
  </g>

  <!-- Floating data points / decorative circles -->
  <g opacity="0.4">
    <circle cx="350" cy="100" r="4" fill="#C9972B"/>
    <circle cx="550" cy="80" r="3" fill="#10B981"/>
    <circle cx="320" cy="250" r="3" fill="#C9972B"/>
    <circle cx="580" cy="280" r="4" fill="#C9972B"/>
    <circle cx="280" cy="450" r="3" fill="#10B981"/>
    <circle cx="620" cy="430" r="3" fill="#C9972B"/>
    <circle cx="350" cy="520" r="4" fill="#10B981"/>
    <circle cx="550" cy="540" r="3" fill="#C9972B"/>
  </g>

  <!-- Metric callout badges -->
  <g filter="url(#softShadow)">
    <!-- 2000+ badge -->
    <rect x="100" y="80" width="110" height="50" rx="8" fill="#0A1628" stroke="url(#goldGrad)" stroke-width="1" opacity="0.9"/>
    <text x="155" y="105" font-family="system-ui, sans-serif" font-size="18" fill="#E8B84B" font-weight="700" text-anchor="middle">2,000+</text>
    <text x="155" y="120" font-family="system-ui, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">BUSINESSES</text>
  </g>

  <g filter="url(#softShadow)">
    <!-- 4.9 rating badge -->
    <rect x="680" y="60" width="100" height="50" rx="8" fill="#0A1628" stroke="url(#greenGrad)" stroke-width="1" opacity="0.9"/>
    <text x="730" y="85" font-family="system-ui, sans-serif" font-size="18" fill="#10B981" font-weight="700" text-anchor="middle">4.9★</text>
    <text x="730" y="100" font-family="system-ui, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">RATING</text>
  </g>

  <!-- Decorative hexagonal elements -->
  <g opacity="0.08" stroke="#C9972B" stroke-width="1" fill="none">
    <polygon points="100,300 115,290 115,270 100,260 85,270 85,290"/>
    <polygon points="800,400 820,388 820,364 800,352 780,364 780,388"/>
    <polygon points="150,620 160,612 160,596 150,588 140,596 140,612"/>
  </g>

  <!-- Subtle ring around center -->
  <circle cx="450" cy="360" r="180" stroke="#C9972B" stroke-width="0.5" opacity="0.1" fill="none" stroke-dasharray="2,8"/>
  <circle cx="450" cy="360" r="260" stroke="#C9972B" stroke-width="0.5" opacity="0.06" fill="none" stroke-dasharray="2,12"/>
</svg>
