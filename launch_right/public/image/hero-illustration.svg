<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9972B"/>
      <stop offset="100%" stop-color="#E8B84B"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Background circles -->
  <circle cx="650" cy="150" r="200" fill="#C9972B" opacity="0.06"/>
  <circle cx="100" cy="500" r="150" fill="#059669" opacity="0.05"/>
  <!-- Main laptop/device illustration -->
  <g filter="url(#shadow)">
    <rect x="180" y="120" width="440" height="300" rx="12" fill="#1E3448" stroke="#2A4A6B" stroke-width="1"/>
    <rect x="195" y="135" width="410" height="260" rx="4" fill="#0A1628"/>
    <!-- Screen content - website mockup -->
    <rect x="195" y="135" width="410" height="40" rx="4" fill="#152238"/>
    <circle cx="215" cy="155" r="6" fill="#C9972B"/>
    <circle cx="235" cy="155" r="6" fill="#C9972B" opacity="0.5"/>
    <rect x="260" y="150" width="100" height="10" rx="5" fill="#1E3448"/>
    <rect x="380" y="150" width="60" height="10" rx="5" fill="#C9972B" opacity="0.3"/>
    <!-- Content area -->
    <rect x="215" y="195" width="180" height="12" rx="6" fill="#C9972B" opacity="0.4"/>
    <rect x="215" y="215" width="250" height="8" rx="4" fill="#2A4A6B"/>
    <rect x="215" y="230" width="200" height="8" rx="4" fill="#2A4A6B"/>
    <rect x="215" y="250" width="160" height="30" rx="6" fill="#C9972B"/>
    <!-- Stats cards -->
    <rect x="215" y="300" width="110" height="70" rx="8" fill="#152238" stroke="#2A4A6B" stroke-width="0.5"/>
    <text x="230" y="330" font-family="sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">2,000+</text>
    <text x="230" y="350" font-family="sans-serif" font-size="10" fill="#6B7280">Clients</text>
    <rect x="340" y="300" width="110" height="70" rx="8" fill="#152238" stroke="#2A4A6B" stroke-width="0.5"/>
    <text x="355" y="330" font-family="sans-serif" font-size="20" fill="#10B981" font-weight="bold">4.9★</text>
    <text x="355" y="350" font-family="sans-serif" font-size="10" fill="#6B7280">Rating</text>
    <rect x="465" y="300" width="110" height="70" rx="8" fill="#152238" stroke="#2A4A6B" stroke-width="0.5"/>
    <text x="480" y="330" font-family="sans-serif" font-size="20" fill="#E8B84B" font-weight="bold">24h</text>
    <text x="480" y="350" font-family="sans-serif" font-size="10" fill="#6B7280">Approval</text>
  </g>
  <!-- Laptop base -->
  <path d="M160 420 L640 420 L680 440 L120 440 Z" fill="#1E3448"/>
  <rect x="120" y="440" width="560" height="6" rx="3" fill="#2A4A6B"/>
  <!-- Floating notification cards -->
  <g filter="url(#shadow)">
    <rect x="50" y="200" width="140" height="60" rx="10" fill="#152238" stroke="#2A4A6B" stroke-width="0.5"/>
    <circle cx="75" cy="230" r="14" fill="#059669" opacity="0.2"/>
    <text x="71" y="235" font-family="sans-serif" font-size="14" fill="#10B981">✓</text>
    <text x="100" y="225" font-family="sans-serif" font-size="10" fill="#FFFFFF" font-weight="bold">CAC Approved</text>
    <text x="100" y="240" font-family="sans-serif" font-size="8" fill="#6B7280">Smart Ventures Ltd</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="620" y="250" width="130" height="55" rx="10" fill="#152238" stroke="#2A4A6B" stroke-width="0.5"/>
    <circle cx="645" cy="278" r="14" fill="#C9972B" opacity="0.2"/>
    <text x="641" y="283" font-family="sans-serif" font-size="14" fill="#E8B84B">⚖</text>
    <text x="670" y="273" font-family="sans-serif" font-size="10" fill="#FFFFFF" font-weight="bold">Legal Docs</text>
    <text x="670" y="288" font-family="sans-serif" font-size="8" fill="#6B7280">Generated</text>
  </g>
  <!-- Decorative elements -->
  <circle cx="400" cy="80" r="3" fill="#C9972B" opacity="0.3"/>
  <circle cx="450" cy="100" r="2" fill="#C9972B" opacity="0.2"/>
  <circle cx="350" cy="90" r="2" fill="#059669" opacity="0.2"/>
</svg>
