    <rect x="70" y="100" width="130" height="75" rx="10" fill="url(#cardGrad)" stroke="#10B981" stroke-width="1" opacity="0.95"/>
    <circle cx="92" cy="122" r="12" fill="#10B981" opacity="0.15"/>
    <!-- Chat icon -->
    <path d="M86 118 L86 124 L90 124 L92 127 L94 124 L98 124 L98 118 Z" fill="none" stroke="#10B981" stroke-width="1"/>
    <text x="135" y="120" font-family="system-ui, sans-serif" font-size="8" fill="#10B981" font-weight="600">Support</text>
