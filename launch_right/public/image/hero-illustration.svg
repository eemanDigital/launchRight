<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9972B"/>
      <stop offset="100%" stop-color="#E8B84B"/>
    </linearGradient>
    <linearGradient id="goldGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9972B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#152238"/>
      <stop offset="100%" stop-color="#1E3448"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9972B" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9972B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9972B" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9972B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2d47"/>
      <stop offset="100%" stop-color="#0f1d30"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#C9972B" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#10B981" flood-opacity="0.12"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Subtle dot grid -->
  <g opacity="0.03" fill="#C9972B">
    <circle cx="100" cy="50" r="1"/><circle cx="200" cy="50" r="1"/><circle cx="300" cy="50" r="1"/><circle cx="400" cy="50" r="1"/><circle cx="500" cy="50" r="1"/><circle cx="600" cy="50" r="1"/><circle cx="700" cy="50" r="1"/><circle cx="800" cy="50" r="1"/>
    <circle cx="100" cy="150" r="1"/><circle cx="200" cy="150" r="1"/><circle cx="300" cy="150" r="1"/><circle cx="400" cy="150" r="1"/><circle cx="500" cy="150" r="1"/><circle cx="600" cy="150" r="1"/><circle cx="700" cy="150" r="1"/><circle cx="800" cy="150" r="1"/>
    <circle cx="100" cy="250" r="1"/><circle cx="200" cy="250" r="1"/><circle cx="300" cy="250" r="1"/><circle cx="400" cy="250" r="1"/><circle cx="500" cy="250" r="1"/><circle cx="600" cy="250" r="1"/><circle cx="700" cy="250" r="1"/><circle cx="800" cy="250" r="1"/>
    <circle cx="100" cy="350" r="1"/><circle cx="200" cy="350" r="1"/><circle cx="300" cy="350" r="1"/><circle cx="400" cy="350" r="1"/><circle cx="500" cy="350" r="1"/><circle cx="600" cy="350" r="1"/><circle cx="700" cy="350" r="1"/><circle cx="800" cy="350" r="1"/>
    <circle cx="100" cy="450" r="1"/><circle cx="200" cy="450" r="1"/><circle cx="300" cy="450" r="1"/><circle cx="400" cy="450" r="1"/><circle cx="500" cy="450" r="1"/><circle cx="600" cy="450" r="1"/><circle cx="700" cy="450" r="1"/><circle cx="800" cy="450" r="1"/>
    <circle cx="100" cy="550" r="1"/><circle cx="200" cy="550" r="1"/><circle cx="300" cy="550" r="1"/><circle cx="400" cy="550" r="1"/><circle cx="500" cy="550" r="1"/><circle cx="600" cy="550" r="1"/><circle cx="700" cy="550" r="1"/><circle cx="800" cy="550" r="1"/>
    <circle cx="100" cy="650" r="1"/><circle cx="200" cy="650" r="1"/><circle cx="300" cy="650" r="1"/><circle cx="400" cy="650" r="1"/><circle cx="500" cy="650" r="1"/><circle cx="600" cy="650" r="1"/><circle cx="700" cy="650" r="1"/><circle cx="800" cy="650" r="1"/>
  </g>

  <!-- Background glow rings -->
