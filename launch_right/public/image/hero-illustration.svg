    <rect x="650" y="80" width="140" height="75" rx="10" fill="url(#cardGrad)" stroke="#10B981" stroke-width="1" opacity="0.95"/>
    <circle cx="672" cy="102" r="12" fill="#10B981" opacity="0.15"/>
    <!-- Browser icon -->
    <rect x="666" y="96" width="12" height="10" rx="2" fill="none" stroke="#10B981" stroke-width="1"/>
    <line x1="666" y1="100" x2="678" y2="100" stroke="#10B981" stroke-width="0.7"/>
    <circle cx="669" cy="98" r="0.8" fill="#10B981"/>
    <circle cx="671" cy="98" r="0.8" fill="#10B981"/>
    <text x="715" y="100" font-family="system-ui, sans-serif" font-size="8" fill="#10B981" font-weight="600">Website</text>
    <text x="715" y="112" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280">Dev &amp; Hosting</text>
    <text x="715" y="124" font-family="system-ui, sans-serif" font-size="7" fill="#E8B84B" font-weight="500">Live ●</text>
    <!-- Connection line -->
