      <rect width="210" height="6" rx="3" fill="url(#greenGrad)"/>
      <text x="0" y="20" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280">Registration progress: 71%</text>
    </g>
    
    <!-- Progress bar 2 -->
