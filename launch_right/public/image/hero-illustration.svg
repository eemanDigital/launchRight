  <circle cx="450" cy="350" r="200" stroke="#C9972B" stroke-width="0.5" opacity="0.1" fill="none" stroke-dasharray="3,10"/>
  <circle cx="450" cy="350" r="130" stroke="#C9972B" stroke-width="0.5" opacity="0.15" fill="none" stroke-dasharray="2,6"/>

