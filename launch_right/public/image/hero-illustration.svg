    <rect x="680" y="340" width="150" height="75" rx="10" fill="url(#cardGrad)" stroke="#C9972B" stroke-width="1" opacity="0.95"/>
    <circle cx="702" cy="362" r="12" fill="#C9972B" opacity="0.15"/>
    <!-- Legal scale icon -->
    <line x1="697" y1="356" x2="707" y2="356" stroke="#E8B84B" stroke-width="1.2"/>
    <line x1="702" y1="356" x2="702" y2="364" stroke="#E8B84B" stroke-width="1.2"/>
    <path d="M695 364 L697 360 L707 360 L709 364" fill="none" stroke="#E8B84B" stroke-width="0.8"/>
    <text x="748" y="360" font-family="system-ui, sans-serif" font-size="8" fill="#E8B84B" font-weight="600">Legal</text>
    <text x="748" y="372" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280">Documents</text>
    <text x="748" y="384" font-family="system-ui, sans-serif" font-size="7" fill="#10B981" font-weight="500">6 templates</text>
    <!-- Connection line -->
    <line x1="620" y1="310" x2="680" y2="355" stroke="url(#lineGrad)" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
    <circle cx="620" cy="310" r="3" fill="#E8B84B" opacity="0.4"/>
  </g>

