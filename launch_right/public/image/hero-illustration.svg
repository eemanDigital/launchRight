    <text x="440" y="460" font-family="system-ui, sans-serif" font-size="8" fill="#10B981" font-weight="600">Software</text>
    <text x="440" y="472" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280">Apps &amp; SaaS</text>
    <text x="440" y="484" font-family="system-ui, sans-serif" font-size="7" fill="#E8B84B" font-weight="500">3 products</text>
    <!-- Connection line -->
    <line x1="450" y1="410" x2="450" y2="440" stroke="url(#lineGradV)" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
    <circle cx="450" cy="410" r="3" fill="#10B981" opacity="0.5"/>
  </g>

  <!-- Card 5: Compliance (left-bottom) -->
  <g filter="url(#cardShadow)">
    <rect x="80" y="340" width="140" height="75" rx="10" fill="url(#cardGrad)" stroke="#C9972B" stroke-width="1" opacity="0.95"/>
    <circle cx="102" cy="362" r="12" fill="#C9972B" opacity="0.15"/>
    <!-- Shield icon -->
