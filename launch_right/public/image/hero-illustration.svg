  <!-- Card 1: CAC Registration (top) -->
  <g filter="url(#cardShadow)">
    <rect x="390" y="30" width="120" height="75" rx="10" fill="url(#cardGrad)" stroke="#C9972B" stroke-width="1" opacity="0.95"/>
    <circle cx="410" cy="52" r="12" fill="#C9972B" opacity="0.15"/>
    <!-- Document icon -->
