    <path d="M100 360 L102 362 L105 358" fill="none" stroke="#E8B84B" stroke-width="0.8" stroke-linecap="round"/>
    <text x="145" y="360" font-family="system-ui, sans-serif" font-size="8" fill="#E8B84B" font-weight="600">Compliance</text>
    <text x="145" y="372" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280">FIRS · SCUML</text>
    <text x="145" y="384" font-family="system-ui, sans-serif" font-size="7" fill="#10B981" font-weight="500">Active</text>
    <!-- Connection line -->
