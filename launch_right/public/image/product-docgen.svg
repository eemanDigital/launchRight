  <text x="105" y="51" font-family="sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Document Generator</text>
  <rect x="270" y="40" width="55" height="14" rx="7" fill="#C9972B"/>
  <text x="278" y="50" font-family="sans-serif" font-size="7" fill="#0A1628" font-weight="bold">LIVE</text>
  <!-- Form area -->
  <rect x="85" y="75" width="230" height="35" rx="6" fill="#0A1628"/>
  <rect x="95" y="85" width="80" height="8" rx="4" fill="#2A4A6B"/>
  <rect x="240" y="85" width="60" height="12" rx="6" fill="#2A4A6B"/>
  <rect x="85" y="118" width="230" height="35" rx="6" fill="#0A1628"/>
