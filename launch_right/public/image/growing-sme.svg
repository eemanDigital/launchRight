<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" fill="none">
  <defs>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="emeraldSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background subtle shape -->
  <rect x="20" y="20" width="280" height="200" rx="16" fill="url(#emeraldSoft)"/>

  <!-- Growth chart -->
  <g>
    <!-- Grid lines -->
    <line x1="50" y1="60" x2="270" y2="60" stroke="#10B981" stroke-width="0.5" opacity="0.2"/>
    <line x1="50" y1="90" x2="270" y2="90" stroke="#10B981" stroke-width="0.5" opacity="0.2"/>
    <line x1="50" y1="120" x2="270" y2="120" stroke="#10B981" stroke-width="0.5" opacity="0.2"/>
    <line x1="50" y1="150" x2="270" y2="150" stroke="#10B981" stroke-width="0.5" opacity="0.2"/>

    <!-- Axes -->
    <line x1="50" y1="150" x2="270" y2="150" stroke="#059669" stroke-width="1.5" opacity="0.5"/>
    <line x1="50" y1="60" x2="50" y2="150" stroke="#059669" stroke-width="1.5" opacity="0.5"/>

    <!-- Growth curve -->
    <path d="M60 140 C80 140, 100 130, 120 120 C140 110, 160 105, 180 95 C200 85, 220 75, 240 65" 
          stroke="url(#emeraldGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    
    <!-- Area fill under curve -->
    <path d="M60 140 C80 140, 100 130, 120 120 C140 110, 160 105, 180 95 C200 85, 220 75, 240 65 L240 150 L60 150 Z" 
          fill="url(#emeraldGrad)" opacity="0.1"/>

    <!-- Data points -->
    <circle cx="60" cy="140" r="4" fill="#059669"/>
    <circle cx="100" cy="130" r="4" fill="#059669"/>
    <circle cx="140" cy="110" r="4" fill="#059669"/>
    <circle cx="180" cy="95" r="4" fill="#059669"/>
    <circle cx="220" cy="75" r="5" fill="#10B981" stroke="#fff" stroke-width="2"/>
    
    <!-- Arrow pointing up at end -->
    <path d="M235 65 L240 55 L245 65" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Label badges -->
  <rect x="200" y="45" width="55" height="18" rx="9" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="0.5"/>
  <text x="227" y="57" font-family="system-ui, sans-serif" font-size="8" fill="#10B981" font-weight="600" text-anchor="middle">+147%</text>

  <!-- Decorative elements -->
  <circle cx="45" cy="35" r="2" fill="#10B981" opacity="0.3"/>
  <circle cx="280" cy="40" r="1.5" fill="#059669" opacity="0.3"/>
</svg>
