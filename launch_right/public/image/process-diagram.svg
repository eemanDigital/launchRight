<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9972B"/>
      <stop offset="100%" stop-color="#E8B84B"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9972B" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#C9972B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="520" fill="#FAFAF9" rx="20"/>

  <!-- Vertical connecting line (center) -->
  <line x1="180" y1="100" x2="180" y2="440" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Dots on the connecting line -->
  <circle cx="180" cy="185" r="5" fill="#C9972B" opacity="0.3"/>
  <circle cx="180" cy="300" r="5" fill="#C9972B" opacity="0.3"/>

  <!-- ========== STEP 1 ========== -->
  <g filter="url(#softShadow)">
    <circle cx="180" cy="100" r="52" fill="url(#navyGrad)" stroke="#C9972B" stroke-width="2"/>
    <!-- Search/listen icon -->
    <circle cx="173" cy="95" r="12" fill="none" stroke="#C9972B" stroke-width="2"/>
    <line x1="182" y1="104" x2="194" y2="116" stroke="#C9972B" stroke-width="2" stroke-linecap="round"/>
    <circle cx="173" cy="95" r="4" fill="#C9972B" opacity="0.25"/>
  </g>
  
  <!-- Step number badge -->
  <rect x="158" y="22" width="44" height="24" rx="12" fill="#C9972B" opacity="0.15"/>
  <text x="180" y="38" font-family="system-ui, sans-serif" font-size="11" fill="#C9972B" font-weight="700" text-anchor="middle">01</text>
  
  <!-- Step text -->
  <text x="270" y="80" font-family="system-ui, sans-serif" font-size="18" fill="#0A1628" font-weight="700">Tell Us Your Needs</text>
  <text x="270" y="102" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">We listen and recommend the best path</text>
  <text x="270" y="118" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">for your business goals.</text>
  
  <!-- Small feature pills -->
  <rect x="270" y="132" width="90" height="22" rx="11" fill="#C9972B" opacity="0.08" stroke="#C9972B" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="315" y="147" font-family="system-ui, sans-serif" font-size="9" fill="#C9972B" text-anchor="middle" font-weight="500">Free Consultation</text>
  
  <rect x="368" y="132" width="80" height="22" rx="11" fill="#C9972B" opacity="0.08" stroke="#C9972B" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="408" y="147" font-family="system-ui, sans-serif" font-size="9" fill="#C9972B" text-anchor="middle" font-weight="500">Name Search</text>

  <!-- ========== STEP 2 ========== -->
  <g filter="url(#softShadow)">
    <circle cx="180" cy="270" r="52" fill="url(#navyGrad)" stroke="#C9972B" stroke-width="2"/>
    <!-- Document/processing icon -->
    <rect x="166" y="248" width="28" height="34" rx="3" fill="none" stroke="#C9972B" stroke-width="1.5"/>
    <line x1="173" y1="260" x2="187" y2="260" stroke="#C9972B" stroke-width="1.5"/>
    <line x1="173" y1="267" x2="185" y2="267" stroke="#C9972B" stroke-width="1.2"/>
    <line x1="173" y1="274" x2="183" y2="274" stroke="#C9972B" stroke-width="1.2"/>
    <circle cx="194" cy="250" r="6" fill="none" stroke="#E8B84B" stroke-width="1" opacity="0.5"/>
    <path d="M191 250 L194 253 L198 247" fill="none" stroke="#E8B84B" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  
  <!-- Step number badge -->
  <rect x="158" y="192" width="44" height="24" rx="12" fill="#C9972B" opacity="0.15"/>
  <text x="180" y="208" font-family="system-ui, sans-serif" font-size="11" fill="#C9972B" font-weight="700" text-anchor="middle">02</text>
  
  <!-- Step text -->
  <text x="270" y="250" font-family="system-ui, sans-serif" font-size="18" fill="#0A1628" font-weight="700">We Handle Everything</text>
  <text x="270" y="272" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">CAC registration, website development,</text>
  <text x="270" y="288" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">and legal documents — all in parallel.</text>
  
  <!-- Feature pills -->
  <rect x="270" y="302" width="65" height="22" rx="11" fill="#C9972B" opacity="0.08" stroke="#C9972B" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="302" y="317" font-family="system-ui, sans-serif" font-size="9" fill="#C9972B" text-anchor="middle" font-weight="500">CAC Filing</text>
  
  <rect x="343" y="302" width="70" height="22" rx="11" fill="#C9972B" opacity="0.08" stroke="#C9972B" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="378" y="317" font-family="system-ui, sans-serif" font-size="9" fill="#C9972B" text-anchor="middle" font-weight="500">Web Design</text>
  
  <rect x="421" y="302" width="80" height="22" rx="11" fill="#C9972B" opacity="0.08" stroke="#C9972B" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="461" y="317" font-family="system-ui, sans-serif" font-size="9" fill="#C9972B" text-anchor="middle" font-weight="500">Legal Docs</text>

  <!-- ========== STEP 3 ========== -->
  <g filter="url(#softShadow)">
    <circle cx="180" cy="440" r="52" fill="url(#navyGrad)" stroke="#C9972B" stroke-width="2"/>
    <!-- Rocket/launch icon -->
    <path d="M180 418 C180 418 170 432 170 444 L170 453 C170 456 174 458 180 458 C186 458 190 456 190 453 L190 444 C190 432 180 418 180 418Z" fill="#C9972B"/>
    <path d="M170 453 L165 462 L170 458Z" fill="#E8B84B"/>
    <path d="M190 453 L195 462 L190 458Z" fill="#E8B84B"/>
    <circle cx="180" cy="437" r="4" fill="#152238"/>
    <line x1="180" y1="408" x2="180" y2="414" stroke="#E8B84B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="174" y1="411" x2="177" y2="416" stroke="#E8B84B" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <line x1="186" y1="411" x2="183" y2="416" stroke="#E8B84B" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Step number badge -->
  <rect x="158" y="362" width="44" height="24" rx="12" fill="#C9972B" opacity="0.15"/>
  <text x="180" y="378" font-family="system-ui, sans-serif" font-size="11" fill="#C9972B" font-weight="700" text-anchor="middle">03</text>
  
  <!-- Step text -->
  <text x="270" y="420" font-family="system-ui, sans-serif" font-size="18" fill="#0A1628" font-weight="700">Launch With Confidence</text>
  <text x="270" y="442" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">Your business is legally registered,</text>
  <text x="270" y="458" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">digitally present, and ready from day one.</text>
  
  <!-- Feature pills -->
  <rect x="270" y="472" width="80" height="22" rx="11" fill="#C9972B" opacity="0.08" stroke="#C9972B" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="310" y="487" font-family="system-ui, sans-serif" font-size="9" fill="#C9972B" text-anchor="middle" font-weight="500">Certificate</text>
  
  <rect x="358" y="472" width="70" height="22" rx="11" fill="#C9972B" opacity="0.08" stroke="#C9972B" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="393" y="487" font-family="system-ui, sans-serif" font-size="9" fill="#C9972B" text-anchor="middle" font-weight="500">Website</text>
  
  <rect x="436" y="472" width="80" height="22" rx="11" fill="#C9972B" opacity="0.08" stroke="#C9972B" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="476" y="487" font-family="system-ui, sans-serif" font-size="9" fill="#C9972B" text-anchor="middle" font-weight="500">Ongoing Support</text>

  <!-- Decorative dots -->
  <circle cx="600" cy="60" r="3" fill="#C9972B" opacity="0.15"/>
  <circle cx="720" cy="200" r="2" fill="#C9972B" opacity="0.12"/>
  <circle cx="650" cy="380" r="2.5" fill="#C9972B" opacity="0.1"/>
  <circle cx="700" cy="480" r="2" fill="#C9972B" opacity="0.15"/>
</svg>