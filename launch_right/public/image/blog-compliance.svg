<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3448"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Office workspace scene -->
  <!-- Desk -->
  <rect x="80" y="140" width="240" height="8" rx="4" fill="#2A4A6B"/>
  <!-- Monitor -->
  <rect x="140" y="60" width="120" height="80" rx="6" fill="#0A1628" stroke="#2A4A6B" stroke-width="1"/>
  <rect x="145" y="65" width="110" height="65" rx="3" fill="#152238"/>
  <rect x="195" y="140" width="10" height="20" fill="#2A4A6B"/>
  <rect x="180" y="158" width="40" height="4" rx="2" fill="#2A4A6B"/>
  <!-- Code on screen -->
  <rect x="152" y="75" width="40" height="4" rx="2" fill="#C9972B" opacity="0.5"/>
  <rect x="152" y="83" width="60" height="4" rx="2" fill="#10B981" opacity="0.4"/>
  <rect x="152" y="91" width="50" height="4" rx="2" fill="#6B7280"/>
  <rect x="152" y="99" width="70" height="4" rx="2" fill="#10B981" opacity="0.4"/>
  <rect x="152" y="107" width="45" height="4" rx="2" fill="#C9972B" opacity="0.5"/>
  <rect x="152" y="115" width="55" height="4" rx="2" fill="#6B7280"/>
  <!-- Plant -->
  <rect x="300" y="110" width="20" height="30" rx="4" fill="#2A4A6B"/>
  <circle cx="310" cy="105" r="15" fill="#059669" opacity="0.3"/>
  <circle cx="305" cy="100" r="8" fill="#059669" opacity="0.2"/>
  <!-- Coffee cup -->
  <rect x="90" y="115" width="20" height="25" rx="4" fill="#FAFAF9" opacity="0.8"/>
  <ellipse cx="100" cy="115" rx="10" ry="3" fill="#E5E7EB"/>
  <!-- Decorative -->
  <circle cx="50" cy="50" r="30" fill="#C9972B" opacity="0.08"/>
  <circle cx="360" cy="200" r="40" fill="#059669" opacity="0.06"/>
</svg>
