<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="blueSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background subtle shape -->
  <rect x="20" y="20" width="280" height="200" rx="16" fill="url(#blueSoft)"/>

  <!-- Rocket launching path -->
  <path d="M160 180 C160 180 140 120 160 60 C180 120 160 180 160 180Z" fill="url(#blueGrad)" opacity="0.2"/>
  
  <!-- Rocket body -->
  <g transform="translate(155, 40)">
    <path d="M5 0 C5 0 12 15 12 28 L12 35 C12 37 10 38 5 38 C0 38 -2 37 -2 35 L-2 28 C-2 15 5 0 5 0Z" fill="url(#blueGrad)"/>
    <path d="M-2 28 L-6 35 L-2 35Z" fill="#2563EB"/>
    <path d="M12 28 L16 35 L12 35Z" fill="#2563EB"/>
    <!-- Window -->
    <circle cx="5" cy="18" r="4" fill="#DBEAFE"/>
    <!-- Flame -->
    <path d="M2 38 L5 48 L8 38Z" fill="#F59E0B" opacity="0.8"/>
    <path d="M3 38 L5 44 L7 38Z" fill="#FBBF24"/>
  </g>

  <!-- Step indicators -->
  <g>
    <circle cx="70" cy="160" r="18" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
    <text x="70" y="165" font-family="system-ui, sans-serif" font-size="12" fill="#3B82F6" font-weight="600" text-anchor="middle">1</text>
    <text x="70" y="190" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">SEARCH</text>
  </g>

  <!-- Connector line -->
  <path d="M88 160 L132 160" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <g>
    <circle cx="160" cy="160" r="18" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
    <text x="160" y="165" font-family="system-ui, sans-serif" font-size="12" fill="#3B82F6" font-weight="600" text-anchor="middle">2</text>
    <text x="160" y="190" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">REGISTER</text>
  </g>

  <!-- Connector line -->
  <path d="M178 160 L222 160" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <g>
    <circle cx="250" cy="160" r="18" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
    <text x="250" y="165" font-family="system-ui, sans-serif" font-size="12" fill="#3B82F6" font-weight="600" text-anchor="middle">3</text>
    <text x="250" y="190" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">LAUNCH</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="40" cy="40" r="2" fill="#3B82F6" opacity="0.3"/>
  <circle cx="280" cy="50" r="2" fill="#3B82F6" opacity="0.3"/>
  <circle cx="260" cy="100" r="1.5" fill="#3B82F6" opacity="0.2"/>
</svg>
